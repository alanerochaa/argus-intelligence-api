# ========================================
# Application
# ========================================
spring.application.name=argus-api

# ========================================
# Database - Oracle FIAP
# ========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521/ORCL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rm559561}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:200702}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ========================================
# Connection Pool - HikariCP
# ========================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false

# ========================================
# SQL Init
# ========================================
spring.sql.init.mode=never

# ========================================
# Logging SQL
# ========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ========================================
# Swagger / OpenAPI
# ========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ========================================
# Server
# ========================================
server.port=${PORT:8080}