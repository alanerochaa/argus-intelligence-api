# ========================================
# Application
# ========================================
spring.application.name=argus-api

# ========================================
# Database - Oracle FIAP
# ========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521/ORCL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rm559561}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:200702}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ========================================
# Connection Pool - HikariCP
# ========================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false

# ========================================
# SQL Init
# ========================================
spring.sql.init.mode=never

# ========================================
# Logging SQL
# ========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ========================================
# Swagger / OpenAPI
# ========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ========================================
# NASA FIRMS API
# ========================================
nasa.firms.map-key=${NASA_FIRMS_MAP_KEY}
nasa.firms.base-url=https://firms.modaps.eosdis.nasa.gov/api
nasa.firms.source=VIIRS_SNPP_NRT
nasa.firms.area=-85,-57,-32,14
nasa.firms.day-range=1

# ========================================
# Weather API
# ========================================
weather.api.url=https://api.open-meteo.com/v1/forecast

# ========================================
# API .NET (Operations)
# ========================================
csharp.api.url=http://localhost:8081

# ========================================
# Spring AI - Azure OpenAI
# ========================================
spring.ai.azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT:https://argus-openai.openai.azure.com/}
spring.ai.azure.openai.api-key=${AZURE_OPENAI_API_KEY:fake-key}
spring.ai.azure.openai.chat.options.deployment-name=${AZURE_OPENAI_DEPLOYMENT:gpt-4o-mini}

# ========================================
# Cache
# ========================================
spring.cache.type=simple

# ========================================
# RabbitMQ (Mensageria)
# ========================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ========================================
# Actuator
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ========================================
# Server
# ========================================
server.port=${PORT:8080}